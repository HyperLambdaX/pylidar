name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install macOS OpenMP runtime
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Configure macOS environment for libomp
        if: runner.os == 'macOS'
        run: |
          echo "LDFLAGS=-L$(brew --prefix libomp)/lib" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$(brew --prefix libomp)/include" >> "$GITHUB_ENV"

      - name: Configure Windows OpenMP backend (LLVM)
        if: runner.os == 'Windows'
        run: echo "CL=/openmp:llvm" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Upgrade pip / install build deps
        run: python -m pip install --upgrade pip

      - name: Install pylidar (editable) + test deps
        run: python -m pip install -v -e ".[test]"

      - name: Run pytest (excluding requires_fixture)
        run: python -m pytest tests -m "not requires_fixture" -v
